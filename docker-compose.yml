services:
  db:
    image: postgres:15-alpine
    container_name: networkassistant-db
    environment:
      POSTGRES_DB: neondb
      POSTGRES_USER: neondb_owner
      POSTGRES_PASSWORD: localpassword
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U neondb_owner -d neondb"]
      interval: 5s
      timeout: 5s
      retries: 5

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: networkassistant-ai-service
    ports:
      - "8000:8000"
    environment:
      GROQ_API_KEY: 
      MODEL_NAME: llama-3.1-8b-instant
      CHUNK_SIZE: 1000
      CHUNK_OVERLAP: 200
      EMBEDDING_MODEL_NAME: all-MiniLM-L6-v2
      CHROMA_COLLECTION_NAME: network_docs
      LLM_TEMPERATURE: 0.2
      UPLOAD_DIR: uploads
    volumes:
      - chromadata:/app/chroma_db
      - ai-uploads:/app/uploads

  backend:
    build:
      context: ./backend-spring
      dockerfile: Dockerfile
    container_name: networkassistant-backend
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
      ai-service:
        condition: service_started
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/neondb
      SPRING_DATASOURCE_USERNAME: neondb_owner
      SPRING_DATASOURCE_PASSWORD: localpassword
      AI_SERVICE_URL: http://ai-service:8000
    volumes:
      - spring-uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: networkassistant-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
  chromadata:
  ai-uploads:
  spring-uploads:
